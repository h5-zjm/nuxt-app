services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/lego
      - NUXT_REDIS_HOST=redis
      - NUXT_REDIS_PORT=6379
      - NUXT_JWT_SECRET=xyx
      - NUXT_API_KEY=4567
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  mongo_data:
